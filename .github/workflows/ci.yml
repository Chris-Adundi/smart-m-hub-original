name: Smart M Hub CI

on:
  push:
    branches: ["master", "main"]
  pull_request:
    branches: ["master", "main"]

jobs:
  backend:
    name: Backend Compile And Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt
      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt
      - name: Dependency consistency check
        run: pip check
      - name: Compile backend
        run: python -m py_compile backend/server.py backend/auth.py backend/worker.py backend/config.py backend/observability.py
      - name: Compile migrations
        run: python -m compileall -q backend/migrations
      - name: Run backend tests
        run: python -m pytest backend/test_phase1_security_controls.py backend/test_phase2_db_controls.py backend/test_phase4_scalability.py backend/test_phase5_api.py backend/test_phase7_observability.py

  frontend:
    name: Main Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Critical dependency audit
        working-directory: frontend
        run: npm audit --audit-level=critical --omit=dev
      - name: Build frontend
        working-directory: frontend
        env:
          REACT_APP_BACKEND_URL: https://api.example.test
        run: npm run build

  super-admin:
    name: Super Admin Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: super-admin-dashboard/package-lock.json
      - name: Install dependencies
        working-directory: super-admin-dashboard
        run: npm ci
      - name: Critical dependency audit
        working-directory: super-admin-dashboard
        run: npm audit --audit-level=critical --omit=dev
      - name: Build super-admin dashboard
        working-directory: super-admin-dashboard
        env:
          VITE_API_BASE_URL: https://api.example.test/api/platform
        run: npm run build

  containers:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend, frontend, super-admin]
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -f backend/Dockerfile -t smart-m-hub-api:ci .
      - name: Build worker image
        run: docker build -f backend/Dockerfile.worker -t smart-m-hub-worker:ci .
      - name: Build frontend image
        run: docker build -f frontend/Dockerfile --build-arg REACT_APP_BACKEND_URL=https://api.example.test -t smart-m-hub-frontend:ci .
      - name: Build super-admin image
        run: docker build -f super-admin-dashboard/Dockerfile --build-arg VITE_API_BASE_URL=https://api.example.test/api/platform -t smart-m-hub-super-admin:ci .
